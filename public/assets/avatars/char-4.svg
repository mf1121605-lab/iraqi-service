  <rect x="68" y="83" width="24" height="17" rx="8" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <rect x="108" y="83" width="24" height="17" rx="8" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <line x1="92" y1="91" x2="108" y2="91" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="68" y1="88" x2="58" y2="84" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="132" y1="88" x2="142" y2="84" stroke="#2a2a2a" stroke-width="2.5"/>
