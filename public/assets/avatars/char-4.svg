  <circle cx="83" cy="90.5" r="1.5" fill="white"/>
  <circle cx="123" cy="90.5" r="1.5" fill="white"/>
  <!-- Nose -->
  <path d="M96 104 Q100 112 104 104" stroke="#a06030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Confident smile -->
  <path d="M88 117 Q100 127 112 117" stroke="#a06030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
