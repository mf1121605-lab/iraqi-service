  <path d="M72 80 Q80 75 90 79" stroke="#1a0808" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M110 79 Q118 75 128 80" stroke="#1a0808" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Eyes -->
  <ellipse cx="80" cy="91" rx="7" ry="7" fill="#d0f0ff" opacity="0.9"/>
  <ellipse cx="120" cy="91" rx="7" ry="7" fill="#d0f0ff" opacity="0.9"/>
  <circle cx="81" cy="92" r="4.5" fill="#1a4a6a"/>
