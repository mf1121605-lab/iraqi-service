<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#1e3a5f"/>
  <!-- Body / white thobe -->
  <ellipse cx="100" cy="182" rx="58" ry="32" fill="#f2f0eb"/>
  <rect x="70" y="155" width="60" height="30" rx="8" fill="#f2f0eb"/>
  <!-- Neck -->
  <rect x="88" y="141" width="24" height="18" rx="6" fill="#d9a87c"/>
  <!-- Head -->
  <circle cx="100" cy="95" r="50" fill="#d9a87c"/>
  <!-- Ears -->
  <ellipse cx="51" cy="96" rx="8" ry="11" fill="#d9a87c"/>
  <ellipse cx="149" cy="96" rx="8" ry="11" fill="#d9a87c"/>
  <ellipse cx="51" cy="96" rx="4" ry="7" fill="#c4875c"/>
  <ellipse cx="149" cy="96" rx="4" ry="7" fill="#c4875c"/>
  <!-- Hair (dark, neat short cut) -->
  <path d="M50 90 Q50 45 100 45 Q150 45 150 90 L148 85 Q140 50 100 50 Q60 50 52 85 Z" fill="#1a1008"/>
  <!-- Eyebrows -->
  <path d="M73 79 Q82 74 91 78" stroke="#1a1008" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M109 78 Q118 74 127 79" stroke="#1a1008" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Eyes white -->
  <ellipse cx="82" cy="90" rx="9" ry="10" fill="white"/>
  <ellipse cx="118" cy="90" rx="9" ry="10" fill="white"/>
  <!-- Irises -->
  <circle cx="83" cy="91" r="6" fill="#3a2000"/>
  <circle cx="119" cy="91" r="6" fill="#3a2000"/>
  <!-- Pupils -->
  <circle cx="84" cy="92" r="3.5" fill="#0a0a0a"/>
  <circle cx="120" cy="92" r="3.5" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <circle cx="85.5" cy="89.5" r="1.8" fill="white"/>
  <circle cx="121.5" cy="89.5" r="1.8" fill="white"/>
  <!-- Eyelashes top -->
  <path d="M73 83 Q82 80 91 83" stroke="#1a1008" stroke-width="1.5" fill="none"/>
  <path d="M109 83 Q118 80 127 83" stroke="#1a1008" stroke-width="1.5" fill="none"/>
  <!-- Nose -->
  <path d="M96 104 Q100 112 104 104" stroke="#b8713e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M86 118 Q100 130 114 118" stroke="#a05a2c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Teeth hint -->
  <path d="M89 119 Q100 126 111 119" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Collar -->
  <path d="M78 157 L100 168 L122 157" stroke="#ddd" stroke-width="2" fill="none"/>
  <!-- Gold trim -->
  <path d="M100 168 L100 182" stroke="#d4a017" stroke-width="2.5"/>
</svg>
