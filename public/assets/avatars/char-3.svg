<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#3d1a00"/>
  <!-- Body / dark thobe -->
  <ellipse cx="100" cy="182" rx="58" ry="32" fill="#2a1800"/>
  <rect x="70" y="155" width="60" height="30" rx="8" fill="#2a1800"/>
  <!-- Neck -->
  <rect x="88" y="141" width="24" height="18" rx="6" fill="#d4956a"/>
  <!-- Head -->
  <circle cx="100" cy="95" r="50" fill="#d4956a"/>
  <!-- Ears -->
  <ellipse cx="51" cy="96" rx="8" ry="11" fill="#d4956a"/>
  <ellipse cx="149" cy="96" rx="8" ry="11" fill="#d4956a"/>
  <ellipse cx="51" cy="96" rx="4" ry="7" fill="#b87040"/>
  <ellipse cx="149" cy="96" rx="4" ry="7" fill="#b87040"/>
  <!-- Keffiyeh (white with black checks pattern) -->
  <path d="M50 82 Q50 45 100 45 Q150 45 150 82 L148 78 Q140 48 100 48 Q60 48 52 78 Z" fill="white"/>
  <!-- Keffiyeh checkered pattern lines -->
  <line x1="62" y1="50" x2="75" y2="65" stroke="#555" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="50" x2="88" y2="65" stroke="#555" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="48" x2="100" y2="68" stroke="#555" stroke-width="1.5" opacity="0.4"/>
  <line x1="125" y1="50" x2="112" y2="65" stroke="#555" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="50" x2="125" y2="65" stroke="#555" stroke-width="1.5" opacity="0.4"/>
  <!-- Agal (black cord on top of keffiyeh) -->
  <ellipse cx="100" cy="60" rx="36" ry="12" fill="none" stroke="#0a0a0a" stroke-width="8"/>
  <!-- Full beard (gray/salt-pepper, older man) -->
  <path d="M62 110 Q60 138 100 148 Q140 138 138 110 Q120 130 100 132 Q80 130 62 110Z" fill="#5a5a5a"/>
  <path d="M65 108 Q80 125 100 128 Q120 125 135 108" stroke="#444" stroke-width="1" fill="none"/>
  <!-- Moustache -->
  <path d="M82 110 Q100 118 118 110" fill="#4a4a4a"/>
  <!-- Eyebrows (heavy, with age) -->
  <path d="M70 80 Q82 73 93 79" stroke="#3a3030" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M107 79 Q118 73 130 80" stroke="#3a3030" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Eyes white -->
  <ellipse cx="82" cy="90" rx="9" ry="9" fill="white"/>
  <ellipse cx="118" cy="90" rx="9" ry="9" fill="white"/>
  <!-- Irises (deep brown) -->
  <circle cx="83" cy="91" r="5.5" fill="#2a1800"/>
  <circle cx="119" cy="91" r="5.5" fill="#2a1800"/>
  <!-- Pupils -->
  <circle cx="83" cy="91" r="3" fill="#0a0500"/>
  <circle cx="119" cy="91" r="3" fill="#0a0500"/>
  <!-- Shine -->
  <circle cx="84.5" cy="89.5" r="1.5" fill="white"/>
  <circle cx="120.5" cy="89.5" r="1.5" fill="white"/>
  <!-- Wrinkle lines (age) -->
  <path d="M66 90 Q70 88 74 90" stroke="#b87040" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M126 90 Q130 88 134 90" stroke="#b87040" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Nose -->
  <path d="M96 102 Q100 110 104 102" stroke="#a06030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
