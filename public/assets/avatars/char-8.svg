<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#1a1030"/>
  <!-- Body / purple hoodie -->
  <ellipse cx="100" cy="182" rx="60" ry="32" fill="#5a3080"/>
  <rect x="68" y="152" width="64" height="33" rx="10" fill="#5a3080"/>
  <!-- Hoodie pocket line -->
  <path d="M80 168 Q100 172 120 168" stroke="#7a50a0" stroke-width="2" fill="none"/>
  <!-- Neck -->
  <rect x="88" y="142" width="24" height="14" rx="6" fill="#e8b898"/>
  <!-- Head -->
  <circle cx="100" cy="96" r="50" fill="#e8b898"/>
  <!-- Ears -->
  <ellipse cx="51" cy="97" rx="8" ry="10" fill="#e8b898"/>
  <ellipse cx="149" cy="97" rx="8" ry="10" fill="#e8b898"/>
  <ellipse cx="51" cy="97" rx="4" ry="6" fill="#d09070"/>
  <ellipse cx="149" cy="97" rx="4" ry="6" fill="#d09070"/>
  <!-- Long straight dark hair (flowing sides) -->
  <path d="M52 88 Q48 130 55 165 Q65 170 70 155 L68 140 Q64 100 62 85Z" fill="#1a0a00"/>
  <path d="M148 88 Q152 130 145 165 Q135 170 130 155 L132 140 Q136 100 138 85Z" fill="#1a0a00"/>
  <!-- Hair top -->
  <path d="M52 88 Q52 45 100 45 Q148 45 148 88 L140 78 Q132 48 100 48 Q68 48 60 78 Z" fill="#1a0a00"/>
  <!-- Light side part + slight wave -->
  <path d="M95 48 L93 68" stroke="#2a1010" stroke-width="2.5"/>
  <!-- Eyebrows (natural, slight arch) -->
  <path d="M72 80 Q82 75 91 79" stroke="#2a1010" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M109 79 Q118 75 128 80" stroke="#2a1010" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Eyes white -->
  <ellipse cx="82" cy="91" rx="9" ry="10" fill="white"/>
  <ellipse cx="118" cy="91" rx="9" ry="10" fill="white"/>
  <!-- Irises (warm hazel) -->
  <circle cx="83" cy="92" r="6.5" fill="#5a3010"/>
  <circle cx="119" cy="92" r="6.5" fill="#5a3010"/>
  <!-- Pupils -->
  <circle cx="84" cy="93" r="4" fill="#0a0500"/>
  <circle cx="120" cy="93" r="4" fill="#0a0500"/>
  <!-- Shine -->
  <circle cx="85.5" cy="90.5" r="2" fill="white"/>
  <circle cx="121.5" cy="90.5" r="2" fill="white"/>
  <!-- Lashes -->
  <path d="M73 84 Q82 80 91 84" stroke="#1a0a00" stroke-width="2" fill="none"/>
  <path d="M109 84 Q118 80 127 84" stroke="#1a0a00" stroke-width="2" fill="none"/>
  <!-- Nose -->
  <path d="M97 106 Q100 112 103 106" stroke="#c07840" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Happy smile -->
  <path d="M86 119 Q100 132 114 119" stroke="#a06030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Soft cheeks -->
  <ellipse cx="70" cy="110" rx="10" ry="7" fill="#e888a0" opacity="0.28"/>
  <ellipse cx="130" cy="110" rx="10" ry="7" fill="#e888a0" opacity="0.28"/>
  <!-- Small star earring (right ear) -->
  <polygon points="149,90 150.5,94 154.5,94 151.5,96.5 152.5,100.5 149,98 145.5,100.5 146.5,96.5 143.5,94 147.5,94" fill="#f0c040" opacity="0.9"/>
</svg>
