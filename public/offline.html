<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — خدماتي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem;
      background: #0d1117;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    .icon { font-size: 3rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #e6ab2c; }
    p { font-size: 0.95rem; color: rgba(255,255,255,0.6); max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.65rem 1.5rem;
      background: #e6ab2c;
      color: #0d1117;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #f5c842; }
  </style>
</head>
<body>
  <span class="icon">📡</span>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>يرجى التحقق من اتصالك بالإنترنت والمحاولة مرة أخرى.</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
</body>
</html>
